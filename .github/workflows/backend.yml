name: Backend CI

on:
  push:
    paths:
      - "backend/**" # Only triggers if files in /backend change
  pull_request:
    paths:
      - "backend/**"

jobs:
  code-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend # Ensures commands run inside the backend folder
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Run Biome
        run: npx -y @biomejs/biome@latest ci .
